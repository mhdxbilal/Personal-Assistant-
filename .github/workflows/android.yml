name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore/Download valid Gradle Wrapper Jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 --decode debug.keystore.base64 > debug.keystore || base64 -d debug.keystore.base64 > debug.keystore
            if [ -s "debug.keystore" ]; then
              echo "Successfully decoded debug.keystore and verified content length."
              ls -la debug.keystore
            else
              echo "ERROR: debug.keystore file is empty!"
              exit 1
            fi
          else
            echo "ERROR: debug.keystore.base64 not found in root!"
            exit 1
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
